<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">

<title>TaxÃ­metro Pro</title>

<style>
body { font-family: Arial; background:#1a1a1a; color:#fff; text-align:center; }
.container { max-width:400px; margin:auto; }
.box { background:#333; padding:15px; margin:10px; border-radius:10px; }
#valorDisplay { color:#0f0; font-size:3em; }
button { padding:15px; margin:5px; border:none; border-radius:5px; }
.btn-start { background:green; color:#fff; width:45%; }
.btn-stop { background:red; color:#fff; width:45%; }
.btn-maps { background:#4285F4; color:#fff; width:95%; }
.btn-pix { background:#00c853; color:#fff; width:95%; }
input { width:95%; padding:10px; margin:10px 0; border-radius:5px; border:none; }
#comprovante { display:none; background:#222; padding:15px; margin-top:10px; border-radius:10px; }
textarea { width:95%; height:80px; border-radius:5px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h2>ðŸš– TaxÃ­metro Pro</h2>

<div class="box">
<div id="valorDisplay">R$ 0,00</div>
<p>DistÃ¢ncia: <span id="distancia">0.00 km</span></p>
<p>Tempo: <span id="tempo">00:00</span></p>
<p>Tarifa: <span id="tipoTarifa">-</span></p>
</div>

<button class="btn-start" onclick="iniciar()">INICIAR</button>
<button class="btn-stop" onclick="parar()">PARAR</button>

<div class="box">
<input type="text" id="destino" placeholder="Digite o destino">
<button class="btn-maps" onclick="abrirMaps()">Abrir no Google Maps</button>
</div>

<div id="comprovante">
<h3>Comprovante</h3>
<p id="compDestino"></p>
<p id="compValor"></p>
<p id="compKm"></p>
<p id="compTempo"></p>
<p id="compTarifa"></p>

<button onclick="compartilhar()" style="width:100%;background:#00c853;color:white;">
ðŸ“² Compartilhar
</button>

<button class="btn-pix" onclick="gerarPixTela()">ðŸ’° Gerar Pix</button>
<textarea id="pixCode" readonly></textarea>
<button class="btn-pix" onclick="copiarPix()">ðŸ“‹ Copiar Pix</button>
<img id="qrPix" style="width:200px;margin:10px auto;display:block;border-radius:10px;" />
</div>

<div class="box">
<h3>ðŸ“Š HistÃ³rico</h3>
<div id="listaHistorico"></div>
<button onclick="limparHistorico()" style="background:#555;color:#fff;width:100%;">
ðŸ§¹ Limpar
</button>
</div>

</div>

<script>

let timer, segundos=0, km=0, rodando=false;
let ultimaPosicao=null, watchId=null;

// PIX
const PIX_KEY="+5586981291332";
const NOME="MOTO TAXI ADRIANO";
const CIDADE="TERESINA";

// INICIAR
function iniciar(){
 if(rodando) return;

 rodando=true;
 segundos=0; km=0; ultimaPosicao=null;

 document.getElementById("comprovante").style.display="none";

 timer=setInterval(()=>{
  segundos++;
  atualizarDisplay();
 },1000);

 watchId=navigator.geolocation.watchPosition(pos=>{
   if(!rodando) return;

   let {latitude:lat, longitude:lon, accuracy}=pos.coords;
   if(accuracy>20) return;

   let agora=Date.now();

   if(!ultimaPosicao){
     ultimaPosicao={lat,lon,tempo:agora};
     return;
   }

   let distancia=calcularDistancia(
     ultimaPosicao.lat, ultimaPosicao.lon, lat, lon
   );

   if(distancia<0.02) return;

   km+=distancia;
   ultimaPosicao={lat,lon,tempo:agora};

 },{enableHighAccuracy:true});
}

// PARAR
function parar(){
 if(!rodando) return;

 rodando=false;
 clearInterval(timer);

 if(watchId){
   navigator.geolocation.clearWatch(watchId);
   watchId=null;
 }

 gerarComprovante();
}

// DISTÃ‚NCIA
function calcularDistancia(lat1, lon1, lat2, lon2){
 const R=6371;
 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;

 let a=Math.sin(dLat/2)**2 +
 Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
 Math.sin(dLon/2)**2;

 return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// VALOR
function atualizarDisplay(){
 let base,valorKm,tipo;

 if(km<=5){base=2.5;valorKm=1;tipo="EconÃ´mica";}
 else if(km<=15){base=3;valorKm=1.1;tipo="PadrÃ£o";}
 else{base=4;valorKm=1.3;tipo="Premium";}

 let total=Math.max(8,base+km*valorKm);

 document.getElementById("valorDisplay").innerText="R$ "+total.toFixed(2).replace(".",",");
 document.getElementById("distancia").innerText=km.toFixed(2)+" km";
 document.getElementById("tempo").innerText=
 Math.floor(segundos/60)+":"+String(segundos%60).padStart(2,"0");
 document.getElementById("tipoTarifa").innerText=tipo;
}

// COMPROVANTE
function gerarComprovante(){
 let destino=document.getElementById("destino").value||"NÃ£o informado";
 let valor=document.getElementById("valorDisplay").innerText;
 let distancia=document.getElementById("distancia").innerText;
 let tempo=document.getElementById("tempo").innerText;
 let tarifa=document.getElementById("tipoTarifa").innerText;

 let agora=new Date();
 let data=agora.toLocaleDateString();
 let hora=agora.toLocaleTimeString();

 let kmNum=parseFloat(distancia);
 let base,valorKm;

 if(kmNum<=5){base=2.5;valorKm=1;}
 else if(kmNum<=15){base=3;valorKm=1.1;}
 else{base=4;valorKm=1.3;}

 let calculo=`Base R$ ${base.toFixed(2)} + (${kmNum.toFixed(2)} km x R$ ${valorKm.toFixed(2)})`;

 let registro={destino,valor};
 let historico=JSON.parse(localStorage.getItem("corridas")||"[]");
 historico.unshift(registro);
 localStorage.setItem("corridas",JSON.stringify(historico));

 mostrarHistorico();

 document.getElementById("compDestino").innerText="Destino: "+destino;
 document.getElementById("compValor").innerText="Valor: "+valor;
 document.getElementById("compKm").innerText="DistÃ¢ncia: "+distancia;
 document.getElementById("compTempo").innerText="Tempo: "+tempo;
 document.getElementById("compTarifa").innerText="Tarifa: "+tarifa;

 document.getElementById("comprovante").style.display="block";

 window.textoCorrida=
`ðŸš– *COMPROVANTE DE CORRIDA*

ðŸ‘¤ Moto TÃ¡xi: ADRIANO
ðŸ“ Destino: ${destino}

ðŸ“… ${data} â° ${hora}

ðŸ“ ${distancia}
â± ${tempo}

ðŸ’¼ ${tarifa}
ðŸ§® ${calculo}

ðŸ’° *${valor}*`;
}

// HISTÃ“RICO
function mostrarHistorico(){
 let h=JSON.parse(localStorage.getItem("corridas")||"[]");
 let lista=document.getElementById("listaHistorico");
 lista.innerHTML="";

 h.forEach(c=>{
   let item=document.createElement("div");
   item.innerHTML=`${c.destino} - ${c.valor}`;
   lista.appendChild(item);
 });
}

function limparHistorico(){
 localStorage.removeItem("corridas");
 mostrarHistorico();
}

// WHATSAPP
function compartilhar(){
 let texto=window.textoCorrida||"Corrida nÃ£o disponÃ­vel";
 window.open("https://wa.me/?text="+encodeURIComponent(texto));
}

// MAPS
function abrirMaps(){
 let d=document.getElementById("destino").value;
 window.open(d
 ? "https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(d)
 : "https://www.google.com/maps");
}

// PIX
function campo(id,v){return id+v.length.toString().padStart(2,'0')+v;}
function crc16(p){let c=0xFFFF;for(let i=0;i<p.length;i++){c^=p.charCodeAt(i)<<8;for(let j=0;j<8;j++){c=(c&0x8000)?(c<<1)^0x1021:c<<1;}}return(c&0xFFFF).toString(16).toUpperCase().padStart(4,"0");}

function gerarPIX(valor){

 let v = valor.toFixed(2);

 let txid = "MTX" + Date.now().toString().slice(-6);

 let payload =
 "000201" +
 campo("26",
   campo("00","BR.GOV.BCB.PIX") +
   campo("01", PIX_KEY)
 ) +
 "52040000" +
 "5303986" +
 campo("54", v) +
 "5802BR" +
 campo("59", NOME) +
 campo("60", CIDADE) +
 campo("62",
   campo("05", txid)
 );

 return payload + "6304" + crc16(payload);
}

function gerarPixTela(){
 let v=parseFloat(document.getElementById("valorDisplay").innerText.replace("R$","").replace(",","."));
 let pix=gerarPIX(v);
 document.getElementById("pixCode").value=pix;
 document.getElementById("qrPix").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(pix);
}

function copiarPix(){
 let c=document.getElementById("pixCode");
 c.select();document.execCommand("copy");
 alert("Pix copiado!");
}

// INIT
window.onload=mostrarHistorico;

// SERVICE WORKER
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
