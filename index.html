<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">
<title>Taxímetro Pro</title>

<style>
body { font-family: Arial; background:#1a1a1a; color:#fff; text-align:center; }
.container { max-width:400px; margin:auto; }
.box { background:#333; padding:15px; margin:10px; border-radius:10px; }
#valorDisplay { color:#0f0; font-size:3em; }
button { padding:15px; margin:5px; border:none; border-radius:5px; }
.btn-start { background:green; color:#fff; width:45%; }
.btn-stop { background:red; color:#fff; width:45%; }
.btn-maps { background:#4285F4; color:#fff; width:95%; }
.btn-pix { background:#00c853; color:#fff; width:95%; }
input { width:95%; padding:10px; margin:10px 0; border-radius:5px; border:none; }
#comprovante { display:none; background:#222; padding:15px; margin-top:10px; border-radius:10px; }
textarea { width:95%; height:80px; border-radius:5px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h2>Taxímetro Pro</h2>

<div class="box">
<div id="valorDisplay">R$ 0,00</div>
<p>Distância: <span id="distancia">0.00 km</span></p>
<p>Tempo: <span id="tempo">00:00</span></p>
<p>Tarifa: <span id="tipoTarifa">-</span></p>
</div>

<button class="btn-start" onclick="iniciar()">INICIAR</button>
<button class="btn-stop" onclick="parar()">PARAR</button>

<div class="box">
<input type="text" id="destino" placeholder="Digite o destino">
<button class="btn-maps" onclick="abrirMaps()">Abrir no Google Maps</button>
</div>

<div id="comprovante">
<h3>Comprovante</h3>
<p id="compDestino"></p>
<p id="compValor"></p>
<p id="compKm"></p>
<p id="compTempo"></p>
<p id="compTarifa"></p>

<button onclick="compartilhar()" style="width:100%;background:#00c853;color:white;">
Compartilhar
</button>

<button class="btn-pix" onclick="gerarPixTela()">💰 Gerar Pix</button>
<textarea id="pixCode" readonly></textarea>
<button class="btn-pix" onclick="copiarPix()">📋 Copiar Pix</button>
<img id="qrPix" style="width:200px;margin:10px auto;display:block;border-radius:10px;" />
</div>

<div id="historico" class="box">
<h3>📊 Histórico</h3>
<p id="totalDia"></p>
<p id="totalMes"></p>
<div id="listaHistorico"></div>

<button onclick="limparHistorico()" style="background:#555;color:#fff;width:100%;">
🧹 Limpar
</button>
</div>

</div>

<script>

let timer;
let segundos = 0;
let km = 0;
let rodando = false;
let ultimaPosicao = null;
let watchId = null;
let contadorMovimento = 0;

// PIX
const PIX_KEY = "+5586981291332";
const NOME = "MOTO TAXI ADRIANO".substring(0,25);
const CIDADE = "TERESINA".substring(0,15);

// 🚀 INICIAR
function iniciar(){
 if(rodando) return;

 rodando = true;
 segundos = 0;
 km = 0;
 ultimaPosicao = null;
 contadorMovimento = 0;

 document.getElementById("comprovante").style.display = "none";

 timer = setInterval(()=>{
  segundos++;
  atualizarDisplay();
 },1000);

 watchId = navigator.geolocation.watchPosition(pos => {

   if(!rodando) return;

   let lat = pos.coords.latitude;
   let lon = pos.coords.longitude;
   let precisao = pos.coords.accuracy;

   if(precisao > 20) return;

   if(!ultimaPosicao){
     ultimaPosicao = { lat, lon, tempo: Date.now() };
     return;
   }

   let agora = Date.now();

   let distancia = calcularDistancia(
     ultimaPosicao.lat,
     ultimaPosicao.lon,
     lat,
     lon
   );

   let tempoDecorrido = (agora - ultimaPosicao.tempo) / 1000;

   // 🚫 ignora micro movimento (<20m)
   if(distancia < 0.02){
     contadorMovimento = 0;
     return;
   }

   let velocidade = (distancia * 1000) / tempoDecorrido;

   // 🚫 parado (<7 km/h)
   if(velocidade < 2){
     contadorMovimento = 0;
     return;
   }

   // 🔥 precisa confirmar movimento
   contadorMovimento++;

   if(contadorMovimento < 3){
     ultimaPosicao = { lat, lon, tempo: agora };
     return;
   }

   // 🚫 salto bugado
   if(distancia > 1) return;

   // ✅ soma km real
   km += distancia;

   ultimaPosicao = { lat, lon, tempo: agora };

 }, {
   enableHighAccuracy: true,
   maximumAge: 0,
   timeout: 5000
 });
}

// 🛑 PARAR
function parar(){
 if(!rodando) return;

 rodando = false;
 clearInterval(timer);

 if(watchId){
   navigator.geolocation.clearWatch(watchId);
   watchId = null;
 }

 gerarComprovante();
}

// 📏 DISTÂNCIA
function calcularDistancia(lat1, lon1, lat2, lon2){
 const R = 6371;
 let dLat = (lat2 - lat1) * Math.PI/180;
 let dLon = (lon2 - lon1) * Math.PI/180;

 let a = Math.sin(dLat/2)**2 +
 Math.cos(lat1*Math.PI/180) *
 Math.cos(lat2*Math.PI/180) *
 Math.sin(dLon/2)**2;

 return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// 💰 VALOR
function atualizarDisplay(){

 let base, valorKm, tipo;

 if(km <= 5){ base=2.5; valorKm=1.0; tipo="Econômica"; }
 else if(km <= 15){ base=3.0; valorKm=1.1; tipo="Padrão"; }
 else{ base=4.0; valorKm=1.3; tipo="Premium"; }

 let total = Math.max(8, base + km * valorKm);

 document.getElementById("valorDisplay").innerText =
 "R$ " + total.toFixed(2).replace(".",",");

 document.getElementById("distancia").innerText = km.toFixed(2)+" km";
 document.getElementById("tempo").innerText =
 Math.floor(segundos/60)+":"+String(segundos%60).padStart(2,"0");
 document.getElementById("tipoTarifa").innerText = tipo;
}

// 🧾 resto (PIX, histórico, etc.) continua igual

window.onload=mostrarHistorico;

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
