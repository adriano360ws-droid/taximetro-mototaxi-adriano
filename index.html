<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#00c853">
<title>Taxímetro Pro</title>
<style>
body { 
    font-family: Arial, sans-serif; 
    background: #1a1a1a; 
    color: #fff; 
    text-align: center; 
    margin: 0; 
    padding: 10px; 
}
.container { max-width: 400px; margin: auto; }
.box { 
    background: #333; 
    padding: 15px; 
    margin: 10px 0; 
    border-radius: 10px; 
}

#valorDisplay { font-size: 4em; font-weight: bold; }
#distancia, #tempo { 
    font-size: 3em !important; 
    font-weight: bold !important;
    color: #00e676 !important;
}
#tipoTarifa { font-size: 2em !important; font-weight: bold; }

button { 
    padding: 15px; 
    margin: 5px; 
    border: none; 
    border-radius: 5px; 
    font-size: 1.1em; 
    font-weight: bold; 
    cursor: pointer;
}
.btn-start { background: green; color: #fff; width: 45%; }
.btn-stop { background: red; color: #fff; width: 45%; }
.btn-maps { background: #4285F4; color: #fff; width: 95%; }
.btn-pix { background: #00c853; color: #fff; width: 95%; }
.btn-history { background: #673AB7; color: #fff; width: 95%; margin-top: 10px; }
.btn-clear { background: #FF5722; color: #fff; width: 100%; }

input {
    width: 95%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 1.1em;
}

#comprovante, #historico {
    display: none;
    background: #222;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
    font-size: 1.1em;
}

textarea {
    width: 95%;
    height: 80px;
    border-radius: 5px;
    margin-top: 10px;
    font-size: 1em;
}

.item-historico {
    background: #333;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    text-align: left;
    border-left: 5px solid #00c853;
}
</style>
</head>
<body>

<div class="container">

    <h2>🚖 Taxímetro Pro</h2>

    <div class="box">
        <div id="valorDisplay">R$ 0,00</div>
        <p>Distância: <span id="distancia">0.00 km</span></p>
        <p>Tempo: <span id="tempo">00:00</span></p>
        <p>Tarifa: <span id="tipoTarifa">-</span></p>
    </div>

    <button class="btn-start" onclick="iniciar()">INICIAR</button>
    <button class="btn-stop" onclick="parar()">PARAR</button>

    <div class="box">
        <input type="text" id="origem" placeholder="Local de saída">
        <input type="text" id="destino" placeholder="Digite o destino">
        <button class="btn-maps" onclick="abrirMaps()">Abrir no Google Maps</button>
    </div>

    <button class="btn-history" onclick="abrirHistorico()">📜 VER HISTÓRICO</button>

    <div id="comprovante">
        <h3>📝 Comprovante</h3>
        <p id="compOrigem"></p>
        <p id="compDestino"></p>
        <p id="compValor"></p>
        <p id="compKm"></p>
        <p id="compTempo"></p>

        <button onclick="compartilhar()" style="width:100%;background:#00c853;color:white;">📲 Compartilhar</button>
        <button class="btn-pix" onclick="gerarPixTela()">💰 Gerar Pix</button>
        <textarea id="pixCode" readonly></textarea>
        <button class="btn-pix" onclick="copiarPix()">📋 Copiar Pix</button>
        <img id="qrPix" style="width:200px;margin:10px auto;display:block;border-radius:10px;" />
    </div>

    <div id="historico">
        <h3>📜 Histórico de Corridas</h3>
        <div id="listaHistorico"></div>
        <button class="btn-clear" onclick="limparHistorico()">🗑️ Limpar Todo o Histórico</button>
        <button onclick="fecharHistorico()" style="width:100%;background:#555;color:white;margin-top:10px;">✖️ Fechar</button>
    </div>

</div>

<script>

let timer, segundos = 0, km = 0, rodando = false;
let ultimaPosicao = null, watchId = null;
let tarifaAtual = "";

// DADOS
const NOME_MOTO = "Adriano Souza";
const TELEFONE = "(86) 98129-1332";
const VEICULO = "Fan CG 125 Preta";
const PLACA = "QRP-5G89";
const PIX_KEY = "+5586981291332";
const NOME = "ADRIANO ALVES DE OLIVEIRA";
const CIDADE = "TERESINA";

// INICIAR
function iniciar() {
    if (rodando) return;
    rodando = true;
    segundos = 0; km = 0; ultimaPosicao = null;
    document.getElementById("comprovante").style.display = "none";

    timer = setInterval(() => { segundos++; atualizarDisplay(); }, 1000);

    watchId = navigator.geolocation.watchPosition(pos => {
        if (!rodando) return;
        let { latitude: lat, longitude: lon, accuracy } = pos.coords;
        if (accuracy > 100) return;

        if (!ultimaPosicao) { ultimaPosicao = { lat, lon }; return; }

        let distancia = calcularDistancia(ultimaPosicao.lat, ultimaPosicao.lon, lat, lon);
        if (distancia > 0.001 && distancia < 2) km += distancia;
        ultimaPosicao = { lat, lon };
    }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
}

// PARAR
function parar() {
    if (!rodando) return;
    rodando = false;
    clearInterval(timer);
    if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    gerarComprovante();
}

// CALCULO
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371;
    let dLat = (lat2 - lat1) * Math.PI / 180;
    let dLon = (lon2 - lon1) * Math.PI / 180;
    let a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

// ATUALIZAR TELA
function atualizarDisplay() {
    let hora = new Date().getHours();
    let minimo, bandeirada, valorKm, tipo, cor;

    if (hora >= 7 && hora < 13) { minimo = 8.00; bandeirada = 3.00; valorKm = 1.10; tipo = "🟢 Barata"; cor = "#00e676"; }
    else if (hora >= 13 && hora < 19) { minimo = 9.00; bandeirada = 3.50; valorKm = 1.25; tipo = "🟡 Média"; cor = "#ffc107"; }
    else { minimo = 10.00; bandeirada = 4.50; valorKm = 1.50; tipo = "🔴 Premium"; cor = "#ff3b3b"; }

    tarifaAtual = tipo;
    let total = Math.max(minimo, bandeirada + (km * valorKm));

    document.getElementById("valorDisplay").innerText = "R$ " + total.toFixed(2).replace(".", ",");
    document.getElementById("valorDisplay").style.color = cor;
    document.getElementById("distancia").innerText = km.toFixed(2) + " km";
    document.getElementById("tempo").innerText = Math.floor(segundos / 60) + ":" + String(segundos % 60).padStart(2, "0");
    document.getElementById("tipoTarifa").innerText = tipo;
}

// COMPROVANTE
function gerarComprovante() {
    let origem = document.getElementById("origem").value || "Não informado";
    let destino = document.getElementById("destino").value || "Não informado";
    let valor = document.getElementById("valorDisplay").innerText;
    let distancia = document.getElementById("distancia").innerText;
    let tempo = document.getElementById("tempo").innerText;

    let data = new Date();
    let dataFormatada = `${data.getDate().toString().padStart(2,'0')}/${(data.getMonth()+1).toString().padStart(2,'0')}/${data.getFullYear()}`;
    let hora = data.toLocaleTimeString('pt-BR');

    document.getElementById("compOrigem").innerText = "Saída: " + origem;
    document.getElementById("compDestino").innerText = "Destino: " + destino;
    document.getElementById("compValor").innerText = "Valor: " + valor;
    document.getElementById("compKm").innerText = "Distância: " + distancia;
    document.getElementById("compTempo").innerText = "Tempo: " + tempo;
    document.getElementById("comprovante").style.display = "block";

    salvarNoHistorico(origem, destino, valor, distancia, tempo, dataFormatada, hora);

    window.textoCorrida = `🛵 COMPROVANTE\n📅 ${dataFormatada} ⏰ ${hora}\n🚏 ${origem} → ${destino}\n💰 ${valor}\n📏 ${distancia}\n⏱ ${tempo}\n👤 ${NOME_MOTO}\n✅ Obrigado!`;
}

// MAPS
function abrirMaps() {
    let d = document.getElementById("destino").value;
    window.open("https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(d));
}

// PIX
function campo(id, v) { const t = String(v.length).padStart(2,'0'); return id + t + v; }
function crc16(s) { let c = 0xFFFF, p = 0x1021; for(let i=0;i<s.length;i++){ c ^= s.charCodeAt(i) << 8; for(let j=0;j<8;j++) c = (c&0x8000)?(c<<1)^p:(c<<1); } return (c&0xFFFF).toString(16).toUpperCase().padStart(4,'0'); }
function gerarPIX(valor) {
    const v = Number(valor).toFixed(2);
    const payload = "000201"+campo("26", campo("00", "br.gov.bcb.pix") + campo("01", PIX_KEY))+"520400005303986"+campo("54", v)+"5802BR"+campo("59", NOME)+campo("60", CIDADE)+"62070503***6304";
    return payload + crc16(payload);
}
function gerarPixTela() {
    let v = parseFloat(document.getElementById("valorDisplay").innerText.replace("R$","").replace(",","."));
    document.getElementById("pixCode").value = gerarPIX(v);
    document.getElementById("qrPix").src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(document.getElementById("pixCode").value);
}
function copiarPix() { let e = document.getElementById("pixCode"); e.select(); document.execCommand("Copy"); alert("Pix copiado!"); }
function compartilhar() { if(navigator.share) navigator.share({text: window.textoCorrida}); else window.open("whatsapp://send?text="+encodeURIComponent(window.textoCorrida)); }

// HISTORICO
function salvarNoHistorico(o, d, v, dis, t, da, h) {
    let hist = JSON.parse(localStorage.getItem('hist') || '[]');
    hist.push({o, d, v, dis, t, da, h});
    localStorage.setItem('hist', JSON.stringify(hist));
}
function carregarHistorico() {
    let hist = JSON.parse(localStorage.getItem('hist') || '[]');
    let div = document.getElementById("listaHistorico");
    div.innerHTML = "";
    if(hist.length == 0) { div.innerHTML = "<p style='color:#aaa'>Nenhuma corrida salva.</p>"; return; }
    hist.forEach((c, i) => {
        let item = document.createElement("div");
        item.className = "item-historico";
        item.innerHTML = `<strong>Corrida ${i+1}</strong><br>📅 ${c.da} ⏰ ${c.h}<br>🚏 ${c.o} → ${c.d}<br>💰 ${c.v} | 📏 ${c.dis} | ⏱ ${c.t}`;
        div.appendChild(item);
    });
}
function abrirHistorico() { carregarHistorico(); document.getElementById("historico").style.display = "block"; }
function fecharHistorico() { document.getElementById("historico").style.display = "none"; }
function limparHistorico() { if(confirm("Tem certeza?")) { localStorage.removeItem('hist'); carregarHistorico(); } }

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
