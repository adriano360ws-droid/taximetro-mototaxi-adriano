<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">
<title>Taxímetro Pro</title>
<style>
body { font-family: Arial; background:#1a1a1a; color:#fff; text-align:center; }
.container { max-width:400px; margin:auto; }
.box { background:#333; padding:15px; margin:10px border-radius:10px; }

/* VALOR TOTAL */
#valorDisplay { font-size: 6em; font-weight: bold; }

/* FONTE GIGANTE */
#distancia, #tempo { 
    font-size: 4em !important; 
    font-weight: bold !important;
    color: #00e676 !important;
}

/* TARIFA COM BOLINHA */
#tipoTarifa {
    font-size: 2.5em !important;
    font-weight: bold !important;
}

button { padding:15px; margin:5px; border:none; border-radius:5px; font-size: 1.2em; font-weight: bold;}
.btn-start { background:green; color:#fff; width:45%; }
.btn-stop { background:red; color:#fff; width:45%; }
.btn-maps { background:#4285F4; color:#fff; width:95%; }
.btn-pix { background:#00c853; color:#fff; width:95%; }

input {
  width:95%;
  padding:15px;
  margin:10px 0;
  border-radius:5px;
  border:none;
  background:#fff;
  color:#000;
  font-size: 1.2em;
}

#comprovante {
  display:none;
  background:#222;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  font-size: 1.2em;
}

textarea {
  width:95%;
  height:80px;
  border-radius:5px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h2 style="font-size: 2em;">🚖 Taxímetro Pro</h2>

<div class="box">
<div id="valorDisplay">R$ 0,00</div>

<p style="font-size: 1.2em; margin: 15px 0 0 0;">Distância: <span id="distancia">0.00 km</span></p>
<p style="font-size: 1.2em; margin: 15px 0 0 0;">Tempo: <span id="tempo">00:00</span></p>

<p style="font-size: 1.5em; margin-top:20px;">Tarifa: <span id="tipoTarifa">-</span></p>
</div>

<button class="btn-start" onclick="iniciar()">INICIAR</button>
<button class="btn-stop" onclick="parar()">PARAR</button>

<div class="box">
<input type="text" id="origem" placeholder="Local de saída">
<input type="text" id="destino" placeholder="Digite o destino">
<button class="btn-maps" onclick="abrirMaps()">Abrir no Google Maps</button>
</div>

<div id="comprovante">
<h3>Comprovante</h3>
<p id="compOrigem"></p>
<p id="compDestino"></p>
<p id="compValor"></p>
<p id="compKm"></p>
<p id="compTempo"></p>

<button onclick="compartilhar()" style="width:100%;background:#00c853;color:white;">
📲 Compartilhar
</button>

<button class="btn-pix" onclick="gerarPixTela()">💰 Gerar Pix</button>
<textarea id="pixCode" readonly></textarea>
<button class="btn-pix" onclick="copiarPix()">📋 Copiar Pix</button>
<img id="qrPix" style="width:200px;margin:10px auto;display:block;border-radius:10px;" />
</div>

</div>

<script>

let timer, segundos=0, km=0, rodando=false;
let ultimaPosicao=null, watchId=null;
let tarifaAtual="";

// DADOS DO MOTOTAXISTA
const NOME_MOTO = "Adriano Souza";
const TELEFONE = "(86) 98129-1332";
const VEICULO = "Fan CG 125 Preta";
const PLACA = "QRP-5G89";

// PIX
const PIX_KEY="+5586981291332";
const NOME="ADRIANO";
const CIDADE="TERESINA";

// INICIAR
function iniciar(){
 if(rodando) return;

 rodando=true;
 segundos=0; 
 km=0; 
 ultimaPosicao=null;

 document.getElementById("comprovante").style.display="none";

 timer=setInterval(()=>{
  segundos++;
  atualizarDisplay();
 },1000);

 watchId = navigator.geolocation.watchPosition(pos => {

  if(!rodando) return;

  let { latitude:lat, longitude:lon, accuracy } = pos.coords;

  if(accuracy > 100) return;

  if(!ultimaPosicao){
    ultimaPosicao = { lat, lon };
    return;
  }

  let distancia = calcularDistancia(
    ultimaPosicao.lat,
    ultimaPosicao.lon,
    lat,
    lon
  );

  if(distancia > 0.001 && distancia < 2){
    km += distancia;
  }

  ultimaPosicao = { lat, lon };

 }, {
  enableHighAccuracy: true,
  maximumAge: 1000,
  timeout: 10000
 });
}

// PARAR
function parar(){
 if(!rodando) return;

 rodando=false;
 clearInterval(timer);

 if(watchId){
   navigator.geolocation.clearWatch(watchId);
   watchId=null;
 }

 gerarComprovante();
}

// CÁLCULO DE DISTÂNCIA
function calcularDistancia(lat1, lon1, lat2, lon2){
 const R=6371;
 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;

 let a=Math.sin(dLat/2)**2 +
 Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
 Math.sin(dLon/2)**2;

 return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// ATUALIZAR VALORES NA TELA
function atualizarDisplay(){

 let hora = new Date().getHours();
 let minimo, bandeirada, valorKm, tipo, cor;

 // === TABELA DE PREÇOS ===
 if(hora < 7){
   minimo = 10.00; 
   bandeirada = 4.00;
   valorKm = 1.15;
   tipo = "🔴 Madrugada";
   cor = "#ff3b3b";
 }
 else if(hora < 19){
   minimo = 8.00;
   bandeirada = 3.00;
   valorKm = 1.20;
   tipo = "🟢 Dia";
   cor = "#00e676";
 }
 else {
   minimo = 9.00;
   bandeirada = 4.00;
   valorKm = 1.30;
   tipo = "🟡 Noturna";
   cor = "#ffc107";
 }
 // =======================

 if(tarifaAtual && tarifaAtual !== tipo){
   tocarSom(); // Toca o som alto aqui
 }
 tarifaAtual = tipo;

 let total = Math.max(minimo, bandeirada + (km * valorKm));

 document.getElementById("valorDisplay").innerText =
 "R$ " + total.toFixed(2).replace(".",",");

 document.getElementById("valorDisplay").style.color = cor;

 document.getElementById("distancia").innerText =
 km.toFixed(2)+" km";

 document.getElementById("tempo").innerText =
 Math.floor(segundos/60)+":"+
 String(segundos%60).padStart(2,"0");

 document.getElementById("tipoTarifa").innerText = tipo;
}

// 🔊 SOM BEM ALTO E FORTE
function tocarSom(){
  try {
     let audio = new Audio("https://www.soundjay.com/button/sounds/beep-07.mp3");
     audio.volume = 1.0; // Volume no MÁXIMO
     audio.play();
  } catch(e){
     console.log("Erro ao tocar som");
  }
}

// GERAR COMPROVANTE
function gerarComprovante(){

 let origem = document.getElementById("origem").value || "Não informado";
 let destino = document.getElementById("destino").value || "Não informado";

 let valor=document.getElementById("valorDisplay").innerText;
 let distancia=document.getElementById("distancia").innerText;
 let tempo=document.getElementById("tempo").innerText;

 // PEGAR DATA ATUAL
 let data = new Date();
 let dia = data.getDate().toString().padStart(2,'0');
 let mes = (data.getMonth()+1).toString().padStart(2,'0');
 let ano = data.getFullYear();
 
 let diasSemana = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
 let diaSemana = diasSemana[data.getDay()];
 let dataFormatada = `${dia} de ${mes}/${ano} - ${diaSemana}`;

 document.getElementById("compOrigem").innerText="Saída: "+origem;
 document.getElementById("compDestino").innerText="Destino: "+destino;
 document.getElementById("compValor").innerText="Valor: "+valor;
 document.getElementById("compKm").innerText="Distância: "+distancia;
 document.getElementById("compTempo").innerText="Tempo: "+tempo;

 document.getElementById("comprovante").style.display="block";

 // TEXTO PARA O WHATSAPP COMPLETO E BONITO
 window.textoCorrida = 
`🛵 COMPROVANTE DE CORRIDA

📅 ${dataFormatada}
⏰ Horário: ${data.toLocaleTimeString('pt-BR')}

🚏 Saída: ${origem}
📍 Destino: ${destino}

💰 Valor: ${valor}
📏 Distância: ${distancia}
⏱ Tempo: ${tempo}

👤 Mototaxista: ${NOME_MOTO}
📞 Contato: ${TELEFONE}
🏍 Veículo: ${VEICULO}
🔤 Placa: ${PLACA}

✅ Obrigado pela preferência!
Volte sempre que precisar, foi um prazer te levar com segurança e agilidade.
Deus abençoe seu passeio! 🙏🚀`;
}

// MAPAS
function abrirMaps(){
 let d=document.getElementById("destino").value;
 window.open("https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(d));
}

// FUNÇÕES PIX
function campo(id,v){return id+v.length.toString().padStart(2,'0')+v;}
function crc16(p){let c=0xFFFF;for(let i=0;i<p.length;i++){c^=p.charCodeAt(i)<<8;for(let j=0;j<8;j++){c=(c&0x8000)?(c<<1)^0x1021:c<<1;}}return(c&0xFFFF).toString(16).toUpperCase().padStart(4,"0");}

function gerarPIX(valor){
 let v=valor.toFixed(2);
 let txid="MTX"+Date.now().toString().slice(-6);

 let payload=
 "000201"+
 campo("26",campo("00","BR.GOV.BCB.PIX")+campo("01",PIX_KEY))+
 "52040000"+
 "5303986"+
 campo("54",v)+
 "5802BR"+
 campo("59",NOME)+
 campo("60",CIDADE)+
 campo("62",campo("05",txid));

 return payload+"6304"+crc16(payload);
}

function gerarPixTela(){
 let v=parseFloat(document.getElementById("valorDisplay").innerText.replace("R$","").replace(",","."));
 let pix=gerarPIX(v);

 document.getElementById("pixCode").value=pix;
 document.getElementById("qrPix").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(pix);
}

function copiarPix(){
 let c=document.getElementById("pixCode");
 c.select();
 document.execCommand("Copy");
 alert("Pix copiado!");
}

function compartilhar(){
 let texto = window.textoCorrida || "Corrida não disponível";
 window.location.href = "whatsapp://send?text="+encodeURIComponent(texto);
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
